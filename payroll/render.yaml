services:
  - type: web
    name: payroll-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: payroll-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
