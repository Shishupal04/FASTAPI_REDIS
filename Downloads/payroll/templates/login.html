<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Payroll Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: #0f172a; display: flex;
      align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { width: 400px; border-radius: 16px; overflow: hidden; }
    .login-header { background: #1e40af; padding: 30px; text-align: center; color: #fff; }
    .login-header h4 { margin: 0; font-weight: 700; }
  </style>
</head>
<body>
<div class="login-card card shadow-lg">
  <div class="login-header">
    <i class="bi bi-building fs-1"></i>
    <h4 class="mt-2">Payroll Pro</h4>
    <small>Corporate Payroll Management</small>
  </div>
  <div class="card-body p-4">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-1"></i> Login
      </button>
    </form>
    <div class="mt-3 p-2 bg-light rounded small text-muted">
      <strong>Default Credentials</strong><br>
      Admin: admin / admin123<br>
      HR: hr / hr123<br>
      Accountant: accountant / acc123
    </div>
  </div>
</div>
</body>
</html>
